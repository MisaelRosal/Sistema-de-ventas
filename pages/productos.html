<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registrar Productos</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    
    <link rel="stylesheet" href="../css/productos.css" />
  </head>
  <body class="bg-light d-flex flex-column min-vh-100">

    <header>
      <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom shadow-sm">
        <div class="container">
          <a class="navbar-brand fw-bold text-dark" href="../index.html">
            <span class="text-primary"></span> Sistema de Ventas
          </a>
          <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
              <li class="nav-item">
                <a class="nav-link" href="../index.html">Inicio</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="inventario.html">Productos</a>
              </li>
              <li class="nav-item">
                <a class="nav-link active fw-semibold text-primary" aria-current="page" href="productos.html">Registrar productos</a>
              </li>
            </ul>
          </div>
        </div>
      </nav>
    </header>

    <main class="container py-5 flex-grow-1">
      
      <section class="mb-4 text-center text-md-start">
        <h2 class="fw-bold text-dark">Registrar nuevo producto</h2>
        <p class="text-muted">Completa los campos del formulario para dar de alta un artículo en el inventario.</p>
      </section>

      <section class="row justify-content-center">
        <div class="col-lg-10">
          <div class="card shadow-sm border-0 rounded-3 p-4 bg-white">
            <form action="#" method="POST">
              
              <h5 class="text-secondary border-bottom pb-2 mb-4 fw-semibold">Datos del Producto</h5>

              <div class="row g-3 mb-3">
                <div class="col-md-4">
                  <label for="codigo" class="form-label fw-medium">Código de producto</label>
                  <input type="text" id="codigo" name="codigo" class="form-control" placeholder="Ej: P001" required />
                </div>
                <div class="col-md-8">
                  <label for="nombre" class="form-label fw-medium">Nombre del producto</label>
                  <input type="text" id="nombre" name="nombre" class="form-control" placeholder="Ej: Monitor Gamer 24\" required />
                </div>
              </div>

              <div class="row g-3 mb-3">
                <div class="col-md-4">
                  <label for="precio" class="form-label fw-medium">Precio ($)</label>
                  <div class="input-group">
                    <span class="input-group-text">$</span>
                    <input type="number" id="precio" name="precio" class="form-control" step="0.01" min="0.01" placeholder="0.00" required />
                  </div>
                </div>
                <div class="col-md-4">
                  <label for="categoria" class="form-label fw-medium">Categoría</label>
                  <select name="categoria" id="categoria" class="form-select" required>
                    <option value="">Seleccione...</option>
                    <option value="Computadoras">Computadoras</option>
                    <option value="Accesorios">Accesorios</option>
                    <option value="Monitores">Monitores</option>
                  </select>
                </div>
                <div class="col-md-4">
                  <label for="cantidad" class="form-label fw-medium">Cantidad (Stock)</label>
                  <input type="number" id="cantidad" name="cantidad" class="form-control" min="1" step="1" placeholder="0" required />
                </div>
              </div>

              <div class="row g-3 mb-3">
                <div class="col-md-4">
                  <label for="fecha" class="form-label fw-medium">Fecha de ingreso</label>
                  <input type="date" id="fecha" name="fecha" class="form-control" required />
                </div>
                <div class="col-md-8 d-flex flex-column justify-content-end pb-1">
                  <span class="form-label fw-medium mb-2 d-block">Estado del Producto</span>
                  <div class="d-flex gap-4 align-items-center h-100">
                    <div class="form-check">
                      <input class="form-check-input" type="radio" name="Estado" id="estadoActivo" value="Activo" checked required />
                      <label class="form-check-label text-success fw-medium" for="estadoActivo">Activo</label>
                    </div>
                    <div class="form-check">
                      <input class="form-check-input" type="radio" name="Estado" id="estadoInactivo" value="Inactivo" />
                      <label class="form-check-label text-danger fw-medium" for="estadoInactivo">Inactivo</label>
                    </div>
                  </div>
                </div>
              </div>

              <div class="mb-4">
                <label for="descripcion" class="form-label fw-medium">Descripción</label>
                <textarea name="descripcion" id="descripcion" class="form-control" rows="4" placeholder="Escribe especificaciones técnicas o detalles del producto..." required></textarea>
              </div>

              <div class="d-flex justify-content-end gap-2 border-top pt-3">
                <button type="reset" class="btn btn-light px-4 border">Limpiar formulario</button>
                <button type="submit" class="btn btn-primary px-5 fw-medium">Guardar Producto</button>
              </div>

            </form>
          </div>
        </div>
      </section>
    </main>

    <footer class="bg-dark text-light py-4 mt-auto text-center">
      <div class="container">
        <p class="mb-0 text-muted">&copy; 2026 Sistema de Ventas - Todos los derechos reservados.</p>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="../js/productos.app.js"></script>
  </body>
</html>
